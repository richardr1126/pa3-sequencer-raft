{{- if .Values.backendFinancial.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-backend-financial
  labels:
    {{- include "marketplace.labels" . | nindent 4 }}
    app: {{ .Values.common.appLabel }}
    component: backend-financial
spec:
  replicas: {{ .Values.backendFinancial.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.common.appLabel }}
      component: backend-financial
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ .Values.common.appLabel }}
        component: backend-financial
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend-financial
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.backendFinancial.image.repository }}:{{ .Values.backendFinancial.image.tag }}"
          imagePullPolicy: {{ .Values.backendFinancial.image.pullPolicy }}
          command:
            - uv
            - run
            - --no-sync
            - backends/financial/main.py
          args:
            - --port
            - {{ .Values.backendFinancial.service.port | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.backendFinancial.service.port }}
              protocol: TCP
          {{- with .Values.backendFinancial.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendFinancial.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendFinancial.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendFinancial.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendFinancial.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
