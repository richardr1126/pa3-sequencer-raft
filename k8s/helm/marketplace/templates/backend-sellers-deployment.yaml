{{- if .Values.backendSellers.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: marketplace-backend-sellers
  labels:
    {{- include "marketplace.labels" . | nindent 4 }}
    app: {{ .Values.common.appLabel }}
    component: backend-sellers
spec:
  replicas: {{ .Values.backendSellers.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.common.appLabel }}
      component: backend-sellers
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: {{ .Values.common.appLabel }}
        component: backend-sellers
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend-sellers
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.backendSellers.image.repository }}:{{ .Values.backendSellers.image.tag }}"
          imagePullPolicy: {{ .Values.backendSellers.image.pullPolicy }}
          command:
            - uv
            - run
            - --no-sync
            - backends/sellers/main.py
          args:
            - --port
            - {{ .Values.backendSellers.service.port | quote }}
            - --customer-db-host
            - {{ index .Values.backendSellers.args "customer-db-host" | quote }}
            - --customer-db-port
            - {{ index .Values.backendSellers.args "customer-db-port" | quote }}
            - --product-db-host
            - {{ index .Values.backendSellers.args "product-db-host" | quote }}
            - --product-db-port
            - {{ index .Values.backendSellers.args "product-db-port" | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.backendSellers.service.port }}
              protocol: TCP
          {{- with .Values.backendSellers.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendSellers.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendSellers.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendSellers.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.backendSellers.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
