# Prefer spreading marketplace pods across nodes first (soft anti-affinity).
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app: marketplace

dbCustomer:
  resources:
    requests: {}
    limits: {}

dbProduct:
  resources:
    requests: {}
    limits: {}

backendSellers:
  ingress:
    enabled: true
    className: traefik
    annotations:
      external-dns.alpha.kubernetes.io/hostname: marketplace-sellers.richardr.dev
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    hosts:
      - host: marketplace-sellers.richardr.dev
        paths:
          - path: /
            pathType: Prefix
  resources:
    requests: {}
    limits: {}

backendBuyers:
  ingress:
    enabled: true
    className: traefik
    annotations:
      external-dns.alpha.kubernetes.io/hostname: marketplace-buyers.richardr.dev
      external-dns.alpha.kubernetes.io/cloudflare-proxied: "false"
    hosts:
      - host: marketplace-buyers.richardr.dev
        paths:
          - path: /
            pathType: Prefix
  resources:
    requests: {}
    limits: {}

backendFinancial:
  resources:
    requests: {}
    limits: {}
