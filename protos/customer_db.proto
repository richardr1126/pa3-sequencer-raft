syntax = "proto3";

package marketplace.customerdb.v1;

import "google/protobuf/timestamp.proto";

service CustomerDbService {
  rpc CreateBuyer(CreateBuyerRequest) returns (CreateBuyerResponse);
  rpc AuthenticateBuyer(AuthenticateBuyerRequest) returns (AuthenticateBuyerResponse);
  rpc GetBuyer(GetBuyerRequest) returns (GetBuyerResponse);
  rpc IncrementBuyerPurchases(IncrementBuyerPurchasesRequest) returns (IncrementBuyerPurchasesResponse);

  rpc CreateSeller(CreateSellerRequest) returns (CreateSellerResponse);
  rpc AuthenticateSeller(AuthenticateSellerRequest) returns (AuthenticateSellerResponse);
  rpc GetSeller(GetSellerRequest) returns (GetSellerResponse);
  rpc UpdateSellerFeedback(UpdateSellerFeedbackRequest) returns (UpdateSellerFeedbackResponse);
  rpc IncrementSellerItemsSold(IncrementSellerItemsSoldRequest) returns (IncrementSellerItemsSoldResponse);

  rpc CreateBuyerSession(CreateBuyerSessionRequest) returns (CreateBuyerSessionResponse);
  rpc ValidateBuyerSession(ValidateBuyerSessionRequest) returns (ValidateBuyerSessionResponse);
  rpc DeleteBuyerSession(DeleteBuyerSessionRequest) returns (DeleteBuyerSessionResponse);
  rpc TouchBuyerSession(TouchBuyerSessionRequest) returns (TouchBuyerSessionResponse);
  rpc CleanupExpiredBuyerSessions(CleanupExpiredBuyerSessionsRequest) returns (CleanupExpiredBuyerSessionsResponse);
  rpc CleanupBuyerSession(CleanupBuyerSessionRequest) returns (CleanupBuyerSessionResponse);

  rpc CreateSellerSession(CreateSellerSessionRequest) returns (CreateSellerSessionResponse);
  rpc ValidateSellerSession(ValidateSellerSessionRequest) returns (ValidateSellerSessionResponse);
  rpc DeleteSellerSession(DeleteSellerSessionRequest) returns (DeleteSellerSessionResponse);
  rpc TouchSellerSession(TouchSellerSessionRequest) returns (TouchSellerSessionResponse);
  rpc CleanupExpiredSellerSessions(CleanupExpiredSellerSessionsRequest) returns (CleanupExpiredSellerSessionsResponse);
  rpc CleanupSellerSession(CleanupSellerSessionRequest) returns (CleanupSellerSessionResponse);

  rpc GetSessionCart(GetSessionCartRequest) returns (GetSessionCartResponse);
  rpc SetSessionCartItem(SetSessionCartItemRequest) returns (SetSessionCartItemResponse);
  rpc RemoveSessionCartItem(RemoveSessionCartItemRequest) returns (RemoveSessionCartItemResponse);
  rpc ClearSessionCart(ClearSessionCartRequest) returns (ClearSessionCartResponse);

  rpc GetSavedCart(GetSavedCartRequest) returns (GetSavedCartResponse);
  rpc SaveCart(SaveCartRequest) returns (SaveCartResponse);
  rpc ClearSavedCart(ClearSavedCartRequest) returns (ClearSavedCartResponse);
  rpc LoadSavedCart(LoadSavedCartRequest) returns (LoadSavedCartResponse);

  rpc AddPurchase(AddPurchaseRequest) returns (AddPurchaseResponse);
  rpc GetPurchaseHistory(GetPurchaseHistoryRequest) returns (GetPurchaseHistoryResponse);
}

message Buyer {
  int64 buyer_id = 1;
  string buyer_name = 2;
  int32 items_purchased = 3;
}

message Seller {
  int64 seller_id = 1;
  string seller_name = 2;
  int32 thumbs_up = 3;
  int32 thumbs_down = 4;
  int32 items_sold = 5;
}

message CartItem {
  int32 item_category = 1;
  int64 item_id = 2;
  int32 quantity = 3;
}

message Purchase {
  int64 purchase_id = 1;
  int32 item_category = 2;
  int64 item_id = 3;
  int32 quantity = 4;
  google.protobuf.Timestamp purchased_at = 5;
}

message CreateBuyerRequest {
  string buyer_name = 1;
  string login_name = 2;
  string password = 3;
}

message CreateBuyerResponse {
  Buyer buyer = 1;
}

message AuthenticateBuyerRequest {
  string login_name = 1;
  string password = 2;
}

message AuthenticateBuyerResponse {
  bool authenticated = 1;
  Buyer buyer = 2;
}

message GetBuyerRequest {
  int64 buyer_id = 1;
}

message GetBuyerResponse {
  bool found = 1;
  Buyer buyer = 2;
}

message IncrementBuyerPurchasesRequest {
  int64 buyer_id = 1;
  optional int32 amount = 2;
}

message IncrementBuyerPurchasesResponse {
  int32 items_purchased = 1;
}

message CreateSellerRequest {
  string seller_name = 1;
  string login_name = 2;
  string password = 3;
}

message CreateSellerResponse {
  Seller seller = 1;
}

message AuthenticateSellerRequest {
  string login_name = 1;
  string password = 2;
}

message AuthenticateSellerResponse {
  bool authenticated = 1;
  Seller seller = 2;
}

message GetSellerRequest {
  int64 seller_id = 1;
}

message GetSellerResponse {
  bool found = 1;
  Seller seller = 2;
}

message UpdateSellerFeedbackRequest {
  int64 seller_id = 1;
  int32 thumbs_up_delta = 2;
  int32 thumbs_down_delta = 3;
}

message UpdateSellerFeedbackResponse {
  int32 thumbs_up = 1;
  int32 thumbs_down = 2;
}

message IncrementSellerItemsSoldRequest {
  int64 seller_id = 1;
  optional int32 amount = 2;
}

message IncrementSellerItemsSoldResponse {
  int32 items_sold = 1;
}

message CreateBuyerSessionRequest {
  int64 buyer_id = 1;
}

message CreateBuyerSessionResponse {
  string session_id = 1;
}

message ValidateBuyerSessionRequest {
  string session_id = 1;
}

message ValidateBuyerSessionResponse {
  bool valid = 1;
  Buyer buyer = 2;
  google.protobuf.Timestamp last_activity_at = 3;
  string reason = 4;
}

message DeleteBuyerSessionRequest {
  string session_id = 1;
}

message DeleteBuyerSessionResponse {
  bool deleted = 1;
}

message TouchBuyerSessionRequest {
  string session_id = 1;
}

message TouchBuyerSessionResponse {
  bool touched = 1;
}

message CleanupExpiredBuyerSessionsRequest {}

message CleanupExpiredBuyerSessionsResponse {
  int32 deleted_count = 1;
}

message CleanupBuyerSessionRequest {
  string session_id = 1;
}

message CleanupBuyerSessionResponse {
  bool deleted = 1;
}

message CreateSellerSessionRequest {
  int64 seller_id = 1;
}

message CreateSellerSessionResponse {
  string session_id = 1;
}

message ValidateSellerSessionRequest {
  string session_id = 1;
}

message ValidateSellerSessionResponse {
  bool valid = 1;
  Seller seller = 2;
  google.protobuf.Timestamp last_activity_at = 3;
  string reason = 4;
}

message DeleteSellerSessionRequest {
  string session_id = 1;
}

message DeleteSellerSessionResponse {
  bool deleted = 1;
}

message TouchSellerSessionRequest {
  string session_id = 1;
}

message TouchSellerSessionResponse {
  bool touched = 1;
}

message CleanupExpiredSellerSessionsRequest {}

message CleanupExpiredSellerSessionsResponse {
  int32 deleted_count = 1;
}

message CleanupSellerSessionRequest {
  string session_id = 1;
}

message CleanupSellerSessionResponse {
  bool deleted = 1;
}

message GetSessionCartRequest {
  string session_id = 1;
}

message GetSessionCartResponse {
  repeated CartItem items = 1;
}

message SetSessionCartItemRequest {
  string session_id = 1;
  int32 item_category = 2;
  int64 item_id = 3;
  int32 quantity = 4;
}

message SetSessionCartItemResponse {
  bool updated = 1;
  int32 quantity = 2;
}

message RemoveSessionCartItemRequest {
  string session_id = 1;
  int32 item_category = 2;
  int64 item_id = 3;
}

message RemoveSessionCartItemResponse {
  bool removed = 1;
}

message ClearSessionCartRequest {
  string session_id = 1;
}

message ClearSessionCartResponse {
  int32 cleared_count = 1;
}

message GetSavedCartRequest {
  int64 buyer_id = 1;
}

message GetSavedCartResponse {
  repeated CartItem items = 1;
}

message SaveCartRequest {
  string session_id = 1;
  int64 buyer_id = 2;
}

message SaveCartResponse {
  int32 saved_count = 1;
}

message ClearSavedCartRequest {
  int64 buyer_id = 1;
}

message ClearSavedCartResponse {
  int32 cleared_count = 1;
}

message LoadSavedCartRequest {
  string session_id = 1;
  int64 buyer_id = 2;
}

message LoadSavedCartResponse {
  int32 loaded_count = 1;
}

message AddPurchaseRequest {
  int64 buyer_id = 1;
  int32 item_category = 2;
  int64 item_id = 3;
  optional int32 quantity = 4;
}

message AddPurchaseResponse {
  int64 purchase_id = 1;
}

message GetPurchaseHistoryRequest {
  int64 buyer_id = 1;
}

message GetPurchaseHistoryResponse {
  repeated Purchase purchases = 1;
}
