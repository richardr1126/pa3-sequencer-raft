syntax = "proto3";

package marketplace.productdb.v1;

import "google/protobuf/timestamp.proto";

service ProductDbService {
  rpc CreateItem(CreateItemRequest) returns (CreateItemResponse);
  rpc GetItem(GetItemRequest) returns (GetItemResponse);
  rpc UpdateItemPrice(UpdateItemPriceRequest) returns (UpdateItemPriceResponse);
  rpc UpdateItemQuantity(UpdateItemQuantityRequest) returns (UpdateItemQuantityResponse);
  rpc DeleteItem(DeleteItemRequest) returns (DeleteItemResponse);
  rpc ListItemsBySeller(ListItemsBySellerRequest) returns (ListItemsBySellerResponse);
  rpc SearchItems(SearchItemsRequest) returns (SearchItemsResponse);

  rpc AddFeedbackVote(AddFeedbackVoteRequest) returns (AddFeedbackVoteResponse);
  rpc GetItemFeedback(GetItemFeedbackRequest) returns (GetItemFeedbackResponse);
  rpc CheckBuyerVoted(CheckBuyerVotedRequest) returns (CheckBuyerVotedResponse);
}

message Item {
  int32 item_category = 1;
  int64 item_id = 2;
  string item_name = 3;
  string condition = 4;
  double sale_price = 5;
  int32 quantity = 6;
  int64 seller_id = 7;
  int32 thumbs_up = 8;
  int32 thumbs_down = 9;
  repeated string keywords = 10;
  google.protobuf.Timestamp deleted_at = 11;
}

message SearchItem {
  Item item = 1;
  int32 match_count = 2;
}

message ItemFeedback {
  int32 thumbs_up = 1;
  int32 thumbs_down = 2;
}

message CreateItemRequest {
  string item_name = 1;
  int32 item_category = 2;
  repeated string keywords = 3;
  string condition = 4;
  double sale_price = 5;
  int32 quantity = 6;
  int64 seller_id = 7;
}

message CreateItemResponse {
  Item item = 1;
}

message GetItemRequest {
  int32 item_category = 1;
  int64 item_id = 2;
  bool include_deleted = 3;
}

message GetItemResponse {
  bool found = 1;
  Item item = 2;
}

message UpdateItemPriceRequest {
  int32 item_category = 1;
  int64 item_id = 2;
  double sale_price = 3;
  optional int64 seller_id = 4;
}

message UpdateItemPriceResponse {
  double sale_price = 1;
}

message UpdateItemQuantityRequest {
  int32 item_category = 1;
  int64 item_id = 2;
  oneof quantity_update {
    int32 quantity = 3;
    int32 quantity_delta = 4;
  }
  optional int64 seller_id = 5;
}

message UpdateItemQuantityResponse {
  int32 quantity = 1;
}

message DeleteItemRequest {
  int32 item_category = 1;
  int64 item_id = 2;
  optional int64 seller_id = 3;
}

message DeleteItemResponse {
  bool deleted = 1;
}

message ListItemsBySellerRequest {
  int64 seller_id = 1;
  bool include_deleted = 2;
}

message ListItemsBySellerResponse {
  repeated Item items = 1;
}

message SearchItemsRequest {
  int32 item_category = 1;
  repeated string keywords = 2;
}

message SearchItemsResponse {
  repeated SearchItem items = 1;
}

message AddFeedbackVoteRequest {
  int64 buyer_id = 1;
  int32 item_category = 2;
  int64 item_id = 3;
  string vote = 4;
}

message AddFeedbackVoteResponse {
  int32 thumbs_up = 1;
  int32 thumbs_down = 2;
  int64 seller_id = 3;
}

message GetItemFeedbackRequest {
  int32 item_category = 1;
  int64 item_id = 2;
}

message GetItemFeedbackResponse {
  bool found = 1;
  ItemFeedback feedback = 2;
}

message CheckBuyerVotedRequest {
  int64 buyer_id = 1;
  int32 item_category = 2;
  int64 item_id = 3;
}

message CheckBuyerVotedResponse {
  bool voted = 1;
  optional string vote = 2;
}
