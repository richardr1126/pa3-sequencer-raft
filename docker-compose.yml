services:
  db-customer:
    build:
      context: .
      dockerfile: docker/Dockerfile.db-customer
    command:
      - uv
      - run
      - --no-sync
      - databases/customer/main.py
      - --port
      - "8001"
    ports:
      - "8001:8001"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s=socket.create_connection(('127.0.0.1',8001),2); s.close()
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  db-product-1:
    build:
      context: .
      dockerfile: docker/Dockerfile.db-product
    environment:
      RAFT_SELF_ADDR: db-product-1:11001
      RAFT_PARTNER_ADDRS: db-product-2:11002,db-product-3:11003
      RAFT_GRPC_PORT_OFFSET: "300"
      RAFT_COMMAND_TIMEOUT_SEC: "3.0"
      PERSISTENCE_DIR: /app/.data
    command:
      - uv
      - run
      - --no-sync
      - databases/product/main.py
      - --port
      - "11301"
    ports:
      - "11301:11301"
    volumes:
      - db-product-1-data:/app/.data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s=socket.create_connection(('127.0.0.1',11301),2); s.close()
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  db-product-2:
    build:
      context: .
      dockerfile: docker/Dockerfile.db-product
    environment:
      RAFT_SELF_ADDR: db-product-2:11002
      RAFT_PARTNER_ADDRS: db-product-1:11001,db-product-3:11003
      RAFT_GRPC_PORT_OFFSET: "300"
      RAFT_COMMAND_TIMEOUT_SEC: "3.0"
      PERSISTENCE_DIR: /app/.data
    command:
      - uv
      - run
      - --no-sync
      - databases/product/main.py
      - --port
      - "11302"
    ports:
      - "11302:11302"
    volumes:
      - db-product-2-data:/app/.data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s=socket.create_connection(('127.0.0.1',11302),2); s.close()
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  db-product-3:
    build:
      context: .
      dockerfile: docker/Dockerfile.db-product
    environment:
      RAFT_SELF_ADDR: db-product-3:11003
      RAFT_PARTNER_ADDRS: db-product-1:11001,db-product-2:11002
      RAFT_GRPC_PORT_OFFSET: "300"
      RAFT_COMMAND_TIMEOUT_SEC: "3.0"
      PERSISTENCE_DIR: /app/.data
    command:
      - uv
      - run
      - --no-sync
      - databases/product/main.py
      - --port
      - "11303"
    ports:
      - "11303:11303"
    volumes:
      - db-product-3-data:/app/.data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import socket; s=socket.create_connection(('127.0.0.1',11303),2); s.close()
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend-financial:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend-financial
    command:
      - uv
      - run
      - --no-sync
      - backends/financial/main.py
      - --port
      - "8005"
    ports:
      - "8005:8005"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8005/healthz', timeout=2)
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend-sellers:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend-sellers
    command:
      - uv
      - run
      - --no-sync
      - backends/sellers/main.py
      - --port
      - "8003"
      - --customer-db-host
      - db-customer
      - --customer-db-port
      - "8001"
      - --product-db-host
      - db-product-1:11301,db-product-2:11302,db-product-3:11303
      - --product-db-port
      - "11301"
    ports:
      - "8003:8003"
    depends_on:
      db-customer:
        condition: service_healthy
      db-product-1:
        condition: service_healthy
      db-product-2:
        condition: service_healthy
      db-product-3:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/healthz', timeout=2)
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  backend-buyers:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend-buyers
    command:
      - uv
      - run
      - --no-sync
      - backends/buyers/main.py
      - --port
      - "8004"
      - --customer-db-host
      - db-customer
      - --customer-db-port
      - "8001"
      - --product-db-host
      - db-product-1:11301,db-product-2:11302,db-product-3:11303
      - --product-db-port
      - "11301"
      - --financial-wsdl-url
      - http://backend-financial:8005/?wsdl
    ports:
      - "8004:8004"
    depends_on:
      db-customer:
        condition: service_healthy
      db-product-1:
        condition: service_healthy
      db-product-2:
        condition: service_healthy
      db-product-3:
        condition: service_healthy
      backend-financial:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/healthz', timeout=2)
      interval: 30s
      timeout: 5s
      retries: 20
      start_period: 15s

  client-sellers:
    build:
      context: .
      dockerfile: docker/Dockerfile.client-sellers
    command:
      - --host
      - backend-sellers
      - --port
      - "8003"
      - --help
    depends_on:
      backend-sellers:
        condition: service_healthy
    profiles:
      - clients

  client-buyers:
    build:
      context: .
      dockerfile: docker/Dockerfile.client-buyers
    command:
      - --host
      - backend-buyers
      - --port
      - "8004"
      - --help
    depends_on:
      backend-buyers:
        condition: service_healthy
    profiles:
      - clients

volumes:
  db-product-1-data:
  db-product-2-data:
  db-product-3-data:
